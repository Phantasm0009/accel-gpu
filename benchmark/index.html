<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>accel-gpu Benchmarks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --bg-elevated: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --slow: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      margin: 0;
      padding: 2rem 1.5rem;
      background: var(--bg);
      color: var(--text);
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .back { margin-bottom: 1rem; }
    .back a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
    .back a:hover { color: var(--accent); }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; font-weight: 600; }
    p { color: var(--text-muted); margin: 0 0 1rem; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
    th, td { padding: 0.6rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--bg-elevated); color: var(--text-muted); font-weight: 500; }
    .fast { color: var(--success); }
    .slow { color: var(--slow); }
    #status { margin: 1rem 0; padding: 0.75rem 1rem; background: var(--bg-elevated); border-radius: 8px; font-size: 0.9rem; border: 1px solid var(--border); }
    button { padding: 0.5rem 1.25rem; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-right: 0.5rem; }
    button:hover { background: #388bfd; }
  </style>
</head>
<body>
  <div class="back"><a href="../">← accel-gpu</a></div>
  <h1>Benchmarks</h1>
  <p>Compare WebGPU vs WebGL vs CPU performance.</p>
  <div id="status">Initializing...</div>
  <button id="run">Run Benchmarks</button>
  <button id="runWebGL">Run with WebGL</button>
  <table>
    <thead>
      <tr><th>Operation</th><th>Size</th><th>WebGPU (ms)</th><th>WebGL (ms)</th><th>CPU (ms)</th><th>Speedup</th></tr>
    </thead>
    <tbody id="results"></tbody>
  </table>

  <script type="module">
    import { init, matmul } from "../dist/index.js";

    const status = document.getElementById("status");
    const results = document.getElementById("results");
    const runBtn = document.getElementById("run");
    const runWebGLBtn = document.getElementById("runWebGL");

    let gpuCtx = null;
    let cpuCtx = null;
    let webglCtx = null;

    async function setup() {
      try {
        gpuCtx = await init();
        cpuCtx = await init({ forceCPU: true });
        try {
          webglCtx = await init({ forceWebGL: true });
        } catch {
          webglCtx = null;
        }
        status.textContent = `Backend: ${gpuCtx.backendType}. Ready to benchmark.`;
      } catch (e) {
        status.textContent = "Error: " + e.message;
      }
    }

    function addRow(op, size, webgpuMs, webglMs, cpuMs) {
      const best = Math.min(webgpuMs, webglMs ?? Infinity, cpuMs);
      const speedup = best > 0 ? (cpuMs / best).toFixed(2) : "-";
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${op}</td><td>${size}</td><td>${webgpuMs.toFixed(2)}</td><td>${webglMs != null ? webglMs.toFixed(2) : "-"}</td><td>${cpuMs.toFixed(2)}</td><td class="${best < cpuMs ? "fast" : "slow"}">${speedup}x</td>`;
      results.appendChild(tr);
    }

    async function runBenchmarks() {
      results.innerHTML = "";
      runBtn.disabled = true;
      status.textContent = "Running benchmarks...";

      const sizes = [
        [1000, "1K"],
        [10000, "10K"],
        [100000, "100K"],
        [1000000, "1M"],
      ];

      for (const [n, label] of sizes) {
        const data = new Float32Array(n).fill(1);
        const a = gpuCtx.array(data);
        const b = gpuCtx.array(data);

        const gpuStart = performance.now();
        await a.add(b);
        await a.sum();
        const gpuEnd = performance.now();

        let webglMs = null;
        if (webglCtx) {
          const a3 = webglCtx.array(data);
          const b3 = webglCtx.array(data);
          const wStart = performance.now();
          await a3.add(b3);
          await a3.sum();
          webglMs = performance.now() - wStart;
        }

        const a2 = cpuCtx.array(data);
        const b2 = cpuCtx.array(data);
        const cpuStart = performance.now();
        await a2.add(b2);
        await a2.sum();
        const cpuEnd = performance.now();

        addRow("add + sum", label, gpuEnd - gpuStart, webglMs, cpuEnd - cpuStart);
      }

      const matmulSizes = [[64, "64×64"], [128, "128×128"], [256, "256×256"]];
      for (const [n, label] of matmulSizes) {
        const A = gpuCtx.array(new Float32Array(n * n).fill(0.01), [n, n]);
        const B = gpuCtx.array(new Float32Array(n * n).fill(0.01), [n, n]);

        const gpuStart = performance.now();
        await matmul(gpuCtx, A, B);
        const gpuEnd = performance.now();

        let webglMs = null;
        if (webglCtx) {
          const A3 = webglCtx.array(new Float32Array(n * n).fill(0.01), [n, n]);
          const B3 = webglCtx.array(new Float32Array(n * n).fill(0.01), [n, n]);
          const wStart = performance.now();
          await matmul(webglCtx, A3, B3);
          webglMs = performance.now() - wStart;
        }

        const A2 = cpuCtx.array(new Float32Array(n * n).fill(0.01), [n, n]);
        const B2 = cpuCtx.array(new Float32Array(n * n).fill(0.01), [n, n]);
        const cpuStart = performance.now();
        await matmul(cpuCtx, A2, B2);
        const cpuEnd = performance.now();

        addRow("matmul", label, gpuEnd - gpuStart, webglMs, cpuEnd - cpuStart);
      }

      status.textContent = "Benchmarks complete.";
      runBtn.disabled = false;
    }

    runBtn.onclick = runBenchmarks;
    runWebGLBtn.onclick = runBenchmarks;
    setup();
  </script>
</body>
</html>
